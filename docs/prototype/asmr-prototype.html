<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のASMR — だんいんログ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=M+PLUS+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream-50: #FCFCFD; --cream-100: #F8F8FA; --cream-200: #EDEDF0;
  --cream-300: #E2E2E6; --cream-400: #D4D4D9;
  --navy-900: #1C2230; --navy-800: #242A3A; --navy-700: #303845;
  --navy-600: #404A55; --navy-500: #545D68; --navy-400: #6A7380;
  --navy-300: #888F99; --navy-200: #ACB1B8; --navy-100: #CDD0D4;
  --gold-600: #8B6D1E; --gold-500: #A6852E; --gold-400: #C8A24C;
  --gold-300: #D4B56A; --gold-200: #E2CC92; --gold-100: #F2E6C4;
  --gold-glow: rgba(200, 162, 76, 0.10);
  --dark-900: #1A1D24; --dark-800: #2A2D35; --dark-700: #3A3D45;
  --white: #FFFFFF; --border: var(--cream-300);
  --font-display: 'Outfit', sans-serif;
  --font-body: 'M PLUS 2', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
  --text-lg: 1.125rem; --text-xl: 1.5rem; --text-2xl: 2rem;
  --sp-xs: 4px; --sp-sm: 8px; --sp-md: 16px; --sp-lg: 24px;
  --sp-xl: 40px; --sp-2xl: 64px;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1); --dur: 0.25s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { background: var(--cream-100); color: var(--navy-700); font-family: var(--font-body); font-size: var(--text-base); line-height: 1.7; overflow-x: hidden; }
a { color: var(--navy-600); text-decoration: none; }

/* HEADER */
.site-header { position: sticky; top: 0; z-index: 100; background: var(--navy-700); border-bottom: 1px solid var(--gold-400); }
.header-inner { max-width: 1120px; margin: 0 auto; padding: 0 var(--sp-lg); height: 56px; display: flex; align-items: center; gap: var(--sp-xl); }
.header-logo { font-family: var(--font-body); font-size: var(--text-base); font-weight: 700; color: var(--gold-100); letter-spacing: 0.02em; transition: color var(--dur) var(--ease); }
.header-logo:hover { color: #FFF; }
.header-nav { display: flex; align-items: center; gap: var(--sp-xs); margin-left: auto; }
.nav-group { position: relative; }
.nav-trigger { display: flex; align-items: center; gap: 4px; padding: 6px 14px; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--gold-100); background: none; border: none; border-radius: var(--r-sm); cursor: pointer; transition: all var(--dur) var(--ease); }
.nav-trigger:hover { color: #FFF; background: rgba(255,255,255,0.08); }
.nav-trigger svg { width: 12px; height: 12px; opacity: 0.5; transition: transform var(--dur) var(--ease); }
.nav-group:hover .nav-trigger svg { transform: rotate(180deg); }
.nav-dropdown { position: absolute; top: calc(100% + 4px); right: 0; min-width: 280px; background: var(--cream-50); border: 1px solid var(--cream-300); border-radius: var(--r-md); padding: var(--sp-sm); box-shadow: 0 8px 24px rgba(26,35,53,0.08); opacity: 0; visibility: hidden; transform: translateY(-4px); transition: all 0.2s var(--ease); pointer-events: none; }
.nav-group:hover .nav-dropdown { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
.nav-dd-item { display: flex; flex-direction: column; gap: 2px; padding: var(--sp-sm) var(--sp-md); border-radius: var(--r-sm); transition: background var(--dur) var(--ease); text-decoration: none; color: inherit; }
.nav-dd-item:hover { background: var(--cream-200); color: inherit; }
.nav-dd-item.current { background: rgba(48,56,69,0.08); }
.nav-dd-name { font-size: var(--text-sm); font-weight: 600; color: var(--dark-800); }
.nav-dd-desc { font-size: var(--text-xs); color: var(--navy-400); line-height: 1.5; }

/* ============================================================
   STAGE
   ============================================================ */
.stage {
  min-height: calc(100vh - 57px - 80px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--sp-xl) var(--sp-lg);
}

.flow-label {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.18em; color: var(--gold-500); margin-bottom: var(--sp-sm);
  text-align: center;
}

.flow-title {
  font-family: var(--font-body); font-size: var(--text-2xl); font-weight: 700;
  color: var(--dark-800); text-align: center; margin-bottom: var(--sp-sm);
}

.flow-desc {
  font-size: var(--text-sm); color: var(--navy-400); text-align: center;
  max-width: 400px; line-height: 1.8; margin-bottom: var(--sp-lg);
}

/* ============================================================
   SLOT — サムネイルスロットマシン
   ============================================================ */
.slot-window {
  width: 480px; max-width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: var(--r-lg);
  overflow: hidden;
  position: relative;
  background: var(--navy-800);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 16px 48px rgba(0,0,0,0.08);
  margin-bottom: var(--sp-xl);
}

/* サムネプレースホルダのリール */
.slot-reel {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  transition: transform 0.08s linear;
}

.slot-slide {
  width: 100%; flex-shrink: 0;
  aspect-ratio: 16 / 9;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

/* 各スライドの背景を微妙に変える（プレースホルダ） */
.slot-slide:nth-child(1) { background: linear-gradient(135deg, #2a3545, #303845); }
.slot-slide:nth-child(2) { background: linear-gradient(135deg, #303845, #283040); }
.slot-slide:nth-child(3) { background: linear-gradient(135deg, #283040, #354050); }
.slot-slide:nth-child(4) { background: linear-gradient(135deg, #354050, #2a3545); }
.slot-slide:nth-child(5) { background: linear-gradient(135deg, #2a3040, #303845); }
.slot-slide:nth-child(6) { background: linear-gradient(135deg, #303845, #2a3040); }

.slot-slide-title {
  font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500;
  color: rgba(255,255,255,0.5); text-align: center; padding: 0 var(--sp-xl);
  max-width: 90%; line-height: 1.5;
}

.slot-slide-icon {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 3rem; opacity: 0.06;
}

/* 再生ボタン（結果時に表示） */
.slot-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s var(--ease);
  cursor: pointer;
  z-index: 5;
}
.slot-play:hover { background: rgba(255,255,255,0.25); }
.slot-play svg { width: 20px; height: 20px; color: var(--white); margin-left: 3px; }
.slot-window.resolved .slot-play { opacity: 1; }

/* スロット停止時のグロー演出 */
.slot-window.resolved {
  box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 16px 48px rgba(0,0,0,0.08), 0 0 0 2px var(--gold-400);
}

/* ============================================================
   INFO BAR — サムネ下のタイトル・メタ（結果時に表示）
   ============================================================ */
.result-info {
  width: 480px; max-width: 100%;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
  margin-bottom: var(--sp-xl);
}
.result-info.visible { opacity: 1; transform: translateY(0); }

.result-title {
  font-size: var(--text-base); font-weight: 600; color: var(--dark-800);
  line-height: 1.5; margin-bottom: var(--sp-xs);
}

.result-meta {
  font-family: var(--font-mono); font-size: var(--text-xs);
  color: var(--navy-300); margin-bottom: var(--sp-sm);
}

.result-tags { display: flex; gap: 5px; flex-wrap: wrap; }

.tag-sm {
  display: inline-block; padding: 1px 7px;
  background: rgba(48,56,69,0.08); color: var(--navy-600);
  font-family: var(--font-mono); font-size: 10px;
  border-radius: 3px; letter-spacing: 0.02em; width: fit-content;
}

/* ============================================================
   DRAW AREA（初期）
   ============================================================ */
.draw-area { text-align: center; }
.draw-area.hidden { display: none; }

.draw-stat {
  font-family: var(--font-mono); font-size: 11px; color: var(--navy-300);
  margin-bottom: var(--sp-md);
}

.btn-draw {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 36px;
  background: var(--navy-700); color: var(--white);
  font-family: var(--font-body); font-size: var(--text-base); font-weight: 600;
  border: none; border-radius: var(--r-md);
  cursor: pointer; transition: all 0.3s var(--ease);
}
.btn-draw:hover { background: var(--navy-800); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(26,35,53,0.18); }
.btn-draw svg { width: 18px; height: 18px; }

/* ============================================================
   ACTIONS（結果時）
   ============================================================ */
.result-actions {
  display: none; flex-direction: column; align-items: center; gap: var(--sp-sm);
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.5s var(--ease) 0.15s, transform 0.5s var(--ease) 0.15s;
}
.result-actions.visible { display: flex; opacity: 1; transform: translateY(0); }

.result-btns { display: flex; gap: var(--sp-sm); }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; background: var(--navy-700); color: var(--white);
  font-family: var(--font-body); font-size: var(--text-sm); font-weight: 600;
  border: none; border-radius: var(--r-sm); cursor: pointer;
  transition: all 0.3s var(--ease);
}
.btn-primary:hover { background: var(--navy-800); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,35,53,0.15); }
.btn-primary svg { width: 14px; height: 14px; }

.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; background: none; color: var(--navy-700);
  font-family: var(--font-body); font-size: var(--text-sm); font-weight: 600;
  border: 1px solid var(--navy-200); border-radius: var(--r-sm); cursor: pointer;
  transition: all 0.3s var(--ease);
}
.btn-secondary:hover { background: var(--navy-700); color: var(--white); border-color: var(--navy-700); }
.btn-secondary svg { width: 14px; height: 14px; }

.btn-retry {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 20px; background: none; color: var(--navy-400);
  font-family: var(--font-body); font-size: var(--text-xs); font-weight: 500;
  border: none; border-radius: var(--r-sm);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.btn-retry:hover { color: var(--navy-700); background: var(--cream-200); }
.btn-retry svg { width: 14px; height: 14px; }

/* FOOTER */
.doc-footer { text-align: center; padding: var(--sp-2xl) var(--sp-lg) var(--sp-xl); border-top: 1px solid var(--cream-300); margin: 0 auto; max-width: 1120px; }
.doc-footer p { font-size: var(--text-xs); color: var(--navy-200); line-height: 1.8; }

/* RESPONSIVE */
@media (max-width: 520px) {
  .slot-window, .result-info { width: 100%; }
  .flow-title { font-size: var(--text-xl); }
  .result-btns { flex-direction: column; width: 100%; }
  .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
  .btn-draw { width: 100%; justify-content: center; }
  .stage { padding: var(--sp-lg) var(--sp-md); }
}
</style>
</head>

<script>
var ASMR = [
  { title: '【ASMR】春の夜の耳かき・添い寝シチュエーション', date: '2026.04.12', dur: '1h28m', tags: ['耳かき','添い寝','囁き'] },
  { title: '【ASMR】囁き多めの癒しタッピング・マッサージ', date: '2026.04.07', dur: '1h45m', tags: ['囁き','タッピング','マッサージ'] },
  { title: '【ASMR】安眠誘導・シャンプー＆ヘッドマッサージ', date: '2026.03.26', dur: '1h50m', tags: ['シャンプー','マッサージ','安眠'] },
  { title: '【ASMR】耳元で囁きながらの耳かき・綿棒', date: '2026.04.01', dur: '1h32m', tags: ['耳かき','囁き','綿棒'] },
  { title: '【ASMR】春の雨音と囁き・耳ふーふー', date: '2026.03.22', dur: '1h35m', tags: ['雨音','囁き','耳ふー'] },
  { title: '【ASMR】深夜の添い寝・吐息多め', date: '2026.03.16', dur: '1h20m', tags: ['添い寝','吐息'] },
  { title: '【ASMR】梅雨のまったり耳かき・水音', date: '2025.06.20', dur: '1h40m', tags: ['耳かき','水音'] },
  { title: '【ASMR】ゆったり添い寝・心音', date: '2025.05.15', dur: '1h15m', tags: ['添い寝','心音'] },
  { title: '【ASMR】オイルマッサージ・囁き', date: '2025.04.22', dur: '1h38m', tags: ['マッサージ','囁き','オイル'] },
  { title: '【ASMR】耳かき専門店ロールプレイ', date: '2025.03.18', dur: '1h42m', tags: ['耳かき','RP'] },
  { title: '【ASMR】焚き火の音と囁き', date: '2025.02.10', dur: '1h25m', tags: ['焚き火','囁き','環境音'] },
  { title: '【ASMR】吐息多めの添い寝・おやすみ', date: '2025.01.20', dur: '1h18m', tags: ['添い寝','吐息'] },
];

var icons = ['🎧','💤','🌙','✨','🌧','😴'];
var bgs = [
  'linear-gradient(135deg, #2a3545, #303845)',
  'linear-gradient(135deg, #303845, #283040)',
  'linear-gradient(135deg, #283040, #354050)',
  'linear-gradient(135deg, #354050, #2a3545)',
  'linear-gradient(135deg, #2a3040, #303845)',
  'linear-gradient(135deg, #303845, #2a3040)',
];

var reel = document.getElementById('slotReel');
var slotWindow = document.getElementById('slotWindow');
var drawArea = document.getElementById('drawArea');
var resultInfo = document.getElementById('resultInfo');
var resultActions = document.getElementById('resultActions');
var lastIdx = -1;

// リールにスライドを生成
function buildReel() {
  reel.innerHTML = '';
  for (var i = 0; i < ASMR.length; i++) {
    var slide = document.createElement('div');
    slide.className = 'slot-slide';
    slide.style.background = bgs[i % bgs.length];
    slide.innerHTML = '<span class="slot-slide-icon">' + icons[i % icons.length] + '</span>' +
      '<span class="slot-slide-title">' + ASMR[i].title.replace('【ASMR】','') + '</span>';
    reel.appendChild(slide);
  }
}

function pick() {
  var idx;
  do { idx = Math.floor(Math.random() * ASMR.length); } while (idx === lastIdx && ASMR.length > 1);
  lastIdx = idx;
  return { idx: idx, data: ASMR[idx] };
}

function showResult(data) {
  document.getElementById('resultTitle').textContent = data.title;
  document.getElementById('resultMeta').textContent = data.date + ' — ' + data.dur;
  document.getElementById('resultTags').innerHTML = data.tags.map(function(t) {
    return '<span class="tag-sm">' + t + '</span>';
  }).join('');
}

function spinReel(targetIdx, callback) {
  var slideH = slotWindow.offsetHeight;
  var totalSlides = ASMR.length;
  // 2周 + ターゲットまで
  var totalDist = (totalSlides * 2 + targetIdx) * slideH;
  var duration = 1800;
  var start = null;
  var currentPos = 0;

  function animate(timestamp) {
    if (!start) start = timestamp;
    var elapsed = timestamp - start;
    var progress = Math.min(elapsed / duration, 1);
    // easeOutQuart for deceleration
    var eased = 1 - Math.pow(1 - progress, 4);
    currentPos = eased * totalDist;
    var offset = -(currentPos % (totalSlides * slideH));
    reel.style.transform = 'translateY(' + offset + 'px)';
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Snap to exact position
      reel.style.transform = 'translateY(' + (-(targetIdx * slideH)) + 'px)';
      callback();
    }
  }
  requestAnimationFrame(animate);
}

function reset() {
  slotWindow.classList.remove('resolved');
  resultInfo.classList.remove('visible');
  resultActions.classList.remove('visible');
  resultActions.style.display = 'none';
  reel.style.transform = 'translateY(0)';
}

// Draw
document.getElementById('drawBtn').addEventListener('click', function() {
  var result = pick();
  showResult(result.data);
  drawArea.classList.add('hidden');
  document.getElementById('flowDesc').style.display = 'none';

  spinReel(result.idx, function() {
    slotWindow.classList.add('resolved');
    resultInfo.classList.add('visible');
    resultActions.style.display = 'flex';
    requestAnimationFrame(function() { resultActions.classList.add('visible'); });
  });
});

// Retry
document.getElementById('retryBtn').addEventListener('click', function() {
  reset();
  var result = pick();
  showResult(result.data);

  setTimeout(function() {
    spinReel(result.idx, function() {
      slotWindow.classList.add('resolved');
      resultInfo.classList.add('visible');
      resultActions.style.display = 'flex';
      requestAnimationFrame(function() { resultActions.classList.add('visible'); });
    });
  }, 100);
});

// Download sim
document.getElementById('dlBtn').addEventListener('click', function() {
  var b = this, o = b.innerHTML;
  b.innerHTML = '準備中...'; b.style.opacity = '0.7'; b.style.pointerEvents = 'none';
  setTimeout(function() {
    b.innerHTML = '&#10003; 完了';
    setTimeout(function() { b.innerHTML = o; b.style.opacity = ''; b.style.pointerEvents = ''; }, 1500);
  }, 1000);
});

// Init
buildReel();
</script>

</body>
</html>
