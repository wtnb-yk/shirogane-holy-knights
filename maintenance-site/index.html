  <style>
    :root {
      --bg-page: #FCFDFE;
      --bg-secondary: #F9F7F4;
      --surface-primary: #324353;
      --accent-gold: #F6C794;
      --accent-blue: #8B9DC3;
      --text-primary: #1F2937;
      --text-muted: #6B7280;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--surface-primary);
      color: #fff;
      padding: 1rem 1.5rem;
      border-bottom: 3px solid var(--accent-gold);
      font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.02em;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      background: var(--accent-gold);
      color: var(--surface-primary);
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 700;
      color: var(--surface-primary);
      margin: 0 0 1.5rem;
      line-height: 1.4;
    }

    .message {
      color: var(--text-primary);
      font-size: 1rem;
      margin: 0 0 2.5rem;
    }

    .message strong {
      color: var(--surface-primary);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent-gold);
      border: 0;
      margin: 0 auto 2rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 2px solid var(--surface-primary);
      border-radius: 9999px;
      color: var(--surface-primary);
      background: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: transform .15s ease, background .2s ease, color .2s ease;
    }

    .links a:hover {
      background: var(--surface-primary);
      color: #fff;
      transform: translateY(-1px);
    }

    .links svg {
      width: 1.1em;
      height: 1.1em;
      fill: currentColor;
    }

    .sub {
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      background: var(--bg-secondary);
    }

    @media (max-width: 480px) {
      main { padding: 2rem 1rem; }
      .links a { width: 100%; justify-content: center; }
    }
  </style>
